<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>耶丝唐卡 Yes Thangka</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #130706;
  color: #fff;
}

.container {
  padding: 40px;
  max-width: 1200px;
  margin: auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
}

.card {
  background: #1d0a09;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid #3a1c1a;
}

.card img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.card-content {
  padding: 20px;
}

.title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 8px;
}

.subtitle {
  color: #d6a85f;
  margin-bottom: 10px;
}

.desc {
  font-size: 14px;
  line-height: 1.6;
  color: #ccc;
}
</style>
</head>

<body>

<div class="container">
  <h1>耶丝唐卡 · Yes Thangka</h1>

  <div class="grid">

    <div class="card">
      <img src="thangka-website/images/amitabha.jpg">
      <div class="card-content">
        <div class="title">阿弥陀佛唐卡</div>
        <div class="subtitle">Amitabha Buddha Thangka</div>
        <div class="desc">正统坐姿，面相安定，整体气质庄严。</div>
      </div>
    </div>

    <div class="card">
      <img src="thangka-website/images/white-mahakala.jpg">
      <div class="card-content">
        <div class="title">白六臂玛哈嘎拉</div>
        <div class="subtitle">White Six-Armed Mahakala</div>
        <div class="desc">护法本尊，象征财富与守护之力。</div>
      </div>
    </div>

    <div class="card">
      <img src="thangka-website/images/mahakala.jpg">
      <div class="card-content">
        <div class="title">大黑天唐卡</div>
        <div class="subtitle">Mahakala Thangka</div>
        <div class="desc">威猛形象，力量感强烈。</div>
      </div>
    </div>

    <div class="card">
      <img src="thangka-website/images/black-dzambhala.jpg">
      <div class="card-content">
        <div class="title">黑财神</div>
        <div class="subtitle">Black Dzambhala</div>
        <div class="desc">主财运，象征财富积累。</div>
      </div>
    </div>

    <div class="card">
      <img src="thangka-website/images/yellow-dzambhala.jpg">
      <div class="card-content">
        <div class="title">黄财神</div>
        <div class="subtitle">Yellow Dzambhala</div>
        <div class="desc">最常见财神，主财富增长。</div>
      </div>
    </div>

    <div class="card">
      <img src="thangka-website/images/yamantaka.jpg">
      <div class="card-content">
        <div class="title">大威德金刚</div>
        <div class="subtitle">Yamantaka</div>
        <div class="desc">文殊忿怒相，象征破除无明。</div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
